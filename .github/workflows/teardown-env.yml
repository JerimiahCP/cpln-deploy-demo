name: Teardown Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to delete"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: "Type the environment name again to confirm deletion"
        required: true

jobs:
  teardown:
    name: Teardown ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.environment }}" != "${{ github.event.inputs.confirm }}" ]; then
            echo "Confirmation does not match. Aborting."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install cpln CLI
        run: npm install -g @controlplane/cli

      - name: Configure cpln profile
        run: cpln profile create default --token "${{ secrets.CPLN_TOKEN }}" --org "${{ vars.CPLN_ORG }}"

      - name: Delete workloads and identities
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          GVC_NAME="${GVC_PREFIX}-${{ github.event.inputs.environment }}"
          COUNT=$(echo "$MANIFEST" | jq '.workloads | length')

          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$MANIFEST" | jq -r ".workloads[$i].name")
            identity=$(echo "$MANIFEST" | jq -r ".workloads[$i].identity")

            echo "Deleting workload: ${name}"
            cpln workload delete "$name" \
              --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true

            echo "Deleting identity: ${identity}"
            cpln identity delete "$identity" \
              --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true
          done

      - name: Delete GVC
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          GVC_NAME="${GVC_PREFIX}-${{ github.event.inputs.environment }}"

          cpln gvc delete "$GVC_NAME" --org "${{ vars.CPLN_ORG }}"

      - name: Verify GVC is gone
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          GVC_NAME="${GVC_PREFIX}-${{ github.event.inputs.environment }}"

          for i in $(seq 1 12); do
            if ! cpln gvc get "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" > /dev/null 2>&1; then
              echo "GVC ${GVC_NAME} confirmed deleted"
              exit 0
            fi
            echo "  attempt $i/12 — GVC still present, waiting..."
            sleep 10
          done
          echo "ERROR: GVC ${GVC_NAME} still exists after 2 minutes"
          exit 1

      - name: Summary
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          echo "Deleted environment: ${{ github.event.inputs.environment }}"
          echo "GVC ${GVC_PREFIX}-${{ github.event.inputs.environment }} and all resources removed."
