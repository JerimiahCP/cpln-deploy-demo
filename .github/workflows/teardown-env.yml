name: Teardown Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to delete"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm:
        description: "Type the environment name again to confirm deletion"
        required: true

jobs:
  teardown:
    name: Teardown ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.environment }}" != "${{ github.event.inputs.confirm }}" ]; then
            echo "Confirmation does not match. Aborting."
            exit 1
          fi

      - name: Install cpln CLI
        run: npm install -g @controlplane/cli

      - name: Configure cpln profile
        run: cpln profile create default --token "${{ secrets.CPLN_TOKEN }}" --org "${{ vars.CPLN_ORG }}"

      - name: Delete workloads and identities
        run: |
          GVC_NAME="stash-${{ github.event.inputs.environment }}"

          cpln workload delete stash \
            --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true

          cpln workload delete analyzer \
            --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true

          cpln identity delete stash-identity \
            --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true

          cpln identity delete analyzer-identity \
            --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" || true

      - name: Delete GVC
        run: |
          cpln gvc delete "stash-${{ github.event.inputs.environment }}" \
            --org "${{ vars.CPLN_ORG }}" || true

      - name: Summary
        run: |
          echo "Deleted environment: ${{ github.event.inputs.environment }}"
          echo "GVC stash-${{ github.event.inputs.environment }} and all resources removed."
