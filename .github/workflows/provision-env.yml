name: Provision Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment name — GVC will be created as stash-<environment>"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      location_1:
        description: "Primary location"
        required: true
        default: aws-us-east-1
        type: choice
        options:
          - aws-us-east-1
          - aws-us-east-2
          - aws-us-west-2
          - aws-eu-central-1
          - aws-sa-east-1
          - azure-eastus2
          - azure-centralus
          - gcp-us-east1
          - gcp-us-central1
          - gcp-us-west1
          - gcp-me-west1
          - oci-us-ashburn-1
          - oci-il-jerusalem-1
      location_2:
        description: "Secondary location (leave blank for single-region)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - aws-us-east-1
          - aws-us-east-2
          - aws-us-west-2
          - aws-eu-central-1
          - aws-sa-east-1
          - azure-eastus2
          - azure-centralus
          - gcp-us-east1
          - gcp-us-central1
          - gcp-us-west1
          - gcp-me-west1
          - oci-us-ashburn-1
          - oci-il-jerusalem-1

# Bootstraps a complete environment: GVC + stash + analyzer.
# Run once per environment. Subsequent code changes use each repo's Deploy workflow.

jobs:
  provision:
    name: Provision ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout stash
        uses: actions/checkout@v4.2.2

      - name: Checkout analyzer
        uses: actions/checkout@v4.2.2
        with:
          repository: JerimiahCP/cpln-deploy-demo-analyzer
          path: analyzer

      - name: Install cpln CLI
        run: npm install -g @controlplane/cli

      - name: Configure cpln profile
        run: cpln profile create default --token "${{ secrets.CPLN_TOKEN }}" --org "${{ vars.CPLN_ORG }}"

      - name: Log in to Control Plane registry
        run: cpln image docker-login --org "${{ vars.CPLN_ORG }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push stash image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ vars.CPLN_ORG }}.registry.cpln.io/stash:${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.run_started_at }}
          cache-from: type=gha,scope=stash
          cache-to:   type=gha,mode=max,scope=stash

      - name: Build and push analyzer image
        uses: docker/build-push-action@v6.16.0
        with:
          context: analyzer
          push: true
          platforms: linux/amd64
          tags: ${{ vars.CPLN_ORG }}.registry.cpln.io/stash-analyzer:${{ github.sha }}
          cache-from: type=gha,scope=analyzer
          cache-to:   type=gha,mode=max,scope=analyzer

      - name: Render CPLN manifests
        env:
          CPLN_ORG:          ${{ vars.CPLN_ORG }}
          GVC_NAME:          stash-${{ github.event.inputs.environment }}
          ENVIRONMENT:       ${{ github.event.inputs.environment }}
          LOCATION_1:        ${{ github.event.inputs.location_1 }}
          LOCATION_2:        ${{ github.event.inputs.location_2 }}
          STORAGE_BACKEND:   ${{ vars.STORAGE_BACKEND }}
          AWS_REGION:        ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET:     ${{ vars.AWS_S3_BUCKET }}
          AWS_CLOUD_ACCOUNT: ${{ vars.AWS_CLOUD_ACCOUNT }}
          AWS_S3_POLICY:     ${{ vars.AWS_S3_POLICY }}
          ANALYZER_URL:      ${{ vars.ANALYZER_URL }}
          IMAGE_TAG:         ${{ vars.CPLN_ORG }}.registry.cpln.io/stash:${{ github.sha }}
          ANALYZER_IMAGE_TAG: ${{ vars.CPLN_ORG }}.registry.cpln.io/stash-analyzer:${{ github.sha }}
        run: |
          mkdir -p cpln-rendered
          envsubst < cpln/gvc.yaml               > cpln-rendered/gvc.yaml
          envsubst < cpln/identity.yaml          > cpln-rendered/identity.yaml
          envsubst < cpln/workload.yaml          > cpln-rendered/workload.yaml
          envsubst < analyzer/cpln/identity.yaml > cpln-rendered/analyzer-identity.yaml
          # Analyzer template uses ${IMAGE_TAG} — swap in the analyzer image before rendering
          IMAGE_TAG="$ANALYZER_IMAGE_TAG" envsubst < analyzer/cpln/workload.yaml > cpln-rendered/analyzer-workload.yaml

          # Remove the second location line if LOCATION_2 was left blank
          sed -i '/\/\/location\/$/d' cpln-rendered/gvc.yaml

          echo "--- Rendered GVC ---"
          cat cpln-rendered/gvc.yaml

      - name: Apply to Control Plane
        run: cpln apply -f cpln-rendered/ --org "${{ vars.CPLN_ORG }}"

      - name: Wait for rollout
        run: |
          GVC_NAME="stash-${{ github.event.inputs.environment }}"
          echo "Waiting for stash to become ready..."
          for i in $(seq 1 24); do
            READY=$(cpln workload get stash --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" -o json \
              | jq -r '.status.readyReplicas // 0')
            if [ "$READY" -ge 1 ]; then
              echo "stash ready ($READY replica)"
              break
            fi
            echo "  attempt $i/24 — not ready yet..."
            sleep 10
          done

      - name: Print endpoint
        run: |
          GVC_NAME="stash-${{ github.event.inputs.environment }}"
          ENDPOINT=$(cpln workload get stash --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" -o json \
            | jq -r '.status.endpoint // "pending"')
          echo ""
          echo "  environment: ${{ github.event.inputs.environment }}"
          echo "  gvc:         $GVC_NAME"
          echo "  version:     ${{ github.sha }}"
          echo "  stash:       ${ENDPOINT}"
          echo "  analyzer:    internal only (same-gvc)"
