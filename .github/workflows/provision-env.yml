name: Provision Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment name — GVC will be created as <gvc_prefix>-<environment>"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      location_1:
        description: "Primary location"
        required: true
        default: aws-us-east-1
        type: choice
        options:
          - aws-us-east-1
          - aws-us-east-2
          - aws-us-west-2
          - aws-eu-central-1
          - aws-sa-east-1
          - azure-eastus2
          - azure-centralus
          - gcp-us-east1
          - gcp-us-central1
          - gcp-us-west1
          - gcp-me-west1
          - oci-us-ashburn-1
          - oci-il-jerusalem-1
      location_2:
        description: "Secondary location (leave blank for single-region)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - aws-us-east-1
          - aws-us-east-2
          - aws-us-west-2
          - aws-eu-central-1
          - aws-sa-east-1
          - azure-eastus2
          - azure-centralus
          - gcp-us-east1
          - gcp-us-central1
          - gcp-us-west1
          - gcp-me-west1
          - oci-us-ashburn-1
          - oci-il-jerusalem-1

# Bootstraps a complete environment: GVC + all workloads defined in deploy.manifest.yml.
# Run once per environment. Subsequent code changes use each repo's Deploy workflow.

jobs:
  provision:
    name: Provision ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install cpln CLI
        run: npm install -g @controlplane/cli

      - name: Configure cpln profile
        run: cpln profile create default --token "${{ secrets.CPLN_TOKEN }}" --org "${{ vars.CPLN_ORG }}"

      - name: Log in to Control Plane registry
        run: cpln image docker-login --org "${{ vars.CPLN_ORG }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Clone workload repos
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          COUNT=$(echo "$MANIFEST" | jq '.workloads | length')
          for i in $(seq 0 $((COUNT - 1))); do
            primary=$(echo "$MANIFEST" | jq -r ".workloads[$i].primary // false")
            [ "$primary" = "true" ] && continue
            repo=$(echo "$MANIFEST" | jq -r ".workloads[$i].repo")
            path=$(echo "$MANIFEST" | jq -r ".workloads[$i].checkout_path")
            echo "Cloning ${repo} → ${path}"
            git clone "https://github.com/${repo}.git" "${path}"
          done

      - name: Build and push images
        env:
          CPLN_ORG: ${{ vars.CPLN_ORG }}
          BUILD_TIME: ${{ github.run_started_at }}
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          COUNT=$(echo "$MANIFEST" | jq '.workloads | length')
          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$MANIFEST" | jq -r ".workloads[$i].name")
            image=$(echo "$MANIFEST" | jq -r ".workloads[$i].image")
            primary=$(echo "$MANIFEST" | jq -r ".workloads[$i].primary // false")

            if [ "$primary" = "true" ]; then
              context="."
              sha="${GITHUB_SHA}"
            else
              context=$(echo "$MANIFEST" | jq -r ".workloads[$i].checkout_path")
              sha=$(git -C "$context" rev-parse HEAD)
            fi

            tag="${CPLN_ORG}.registry.cpln.io/${image}:${sha}"
            echo "Building ${name} → ${tag}"

            docker buildx build \
              --platform linux/amd64 \
              --push \
              -t "$tag" \
              --build-arg "BUILD_VERSION=${sha}" \
              --build-arg "BUILD_TIME=${BUILD_TIME}" \
              --cache-from "type=gha,scope=${name}" \
              --cache-to "type=gha,mode=max,scope=${name}" \
              "$context"
          done

      - name: Render CPLN manifests
        env:
          CPLN_ORG:          ${{ vars.CPLN_ORG }}
          ENVIRONMENT:       ${{ github.event.inputs.environment }}
          LOCATION_1:        ${{ github.event.inputs.location_1 }}
          LOCATION_2:        ${{ github.event.inputs.location_2 }}
          STORAGE_BACKEND:   ${{ vars.STORAGE_BACKEND }}
          AWS_REGION:        ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET:     ${{ vars.AWS_S3_BUCKET }}
          AWS_CLOUD_ACCOUNT: ${{ vars.AWS_CLOUD_ACCOUNT }}
          AWS_S3_POLICY:     ${{ vars.AWS_S3_POLICY }}
          ANALYZER_URL:      ${{ vars.ANALYZER_URL }}
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          COUNT=$(echo "$MANIFEST" | jq '.workloads | length')
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          export GVC_NAME="${GVC_PREFIX}-${ENVIRONMENT}"

          mkdir -p cpln-rendered

          # Render the GVC (once)
          envsubst < cpln/gvc.yaml > cpln-rendered/gvc.yaml
          sed -i '/\/\/location\/$/d' cpln-rendered/gvc.yaml
          echo "--- Rendered GVC ---"
          cat cpln-rendered/gvc.yaml

          # Render identity + workload for each workload in the manifest
          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$MANIFEST" | jq -r ".workloads[$i].name")
            image=$(echo "$MANIFEST" | jq -r ".workloads[$i].image")
            primary=$(echo "$MANIFEST" | jq -r ".workloads[$i].primary // false")
            cpln_identity=$(echo "$MANIFEST" | jq -r ".workloads[$i].cpln_identity")
            cpln_workload=$(echo "$MANIFEST" | jq -r ".workloads[$i].cpln_workload")

            if [ "$primary" = "true" ]; then
              base="."
              sha="${GITHUB_SHA}"
            else
              base=$(echo "$MANIFEST" | jq -r ".workloads[$i].checkout_path")
              sha=$(git -C "$base" rev-parse HEAD)
            fi

            IMAGE_TAG="${CPLN_ORG}.registry.cpln.io/${image}:${sha}" \
              envsubst < "${base}/${cpln_identity}" > "cpln-rendered/${name}-identity.yaml"

            IMAGE_TAG="${CPLN_ORG}.registry.cpln.io/${image}:${sha}" \
              envsubst < "${base}/${cpln_workload}" > "cpln-rendered/${name}-workload.yaml"

            echo "--- Rendered ${name} ---"
            cat "cpln-rendered/${name}-workload.yaml"
          done

      - name: Apply to Control Plane
        run: cpln apply -f cpln-rendered/ --org "${{ vars.CPLN_ORG }}"

      - name: Wait for rollout
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          GVC_NAME="${GVC_PREFIX}-${{ github.event.inputs.environment }}"
          PRIMARY=$(echo "$MANIFEST" | jq -r '.workloads[] | select(.primary == true) | .name')

          echo "Waiting for ${PRIMARY} to become ready..."
          for i in $(seq 1 24); do
            READY=$(cpln workload get "$PRIMARY" --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" -o json \
              | jq -r '.status.readyReplicas // 0')
            if [ "$READY" -ge 1 ]; then
              echo "${PRIMARY} ready ($READY replica)"
              break
            fi
            echo "  attempt $i/24 — not ready yet..."
            sleep 10
          done

      - name: Print endpoint
        run: |
          MANIFEST=$(python3 -c "import yaml,json; print(json.dumps(yaml.safe_load(open('deploy.manifest.yml'))))")
          GVC_PREFIX=$(echo "$MANIFEST" | jq -r '.gvc_prefix')
          GVC_NAME="${GVC_PREFIX}-${{ github.event.inputs.environment }}"
          PRIMARY=$(echo "$MANIFEST" | jq -r '.workloads[] | select(.primary == true) | .name')

          ENDPOINT=$(cpln workload get "$PRIMARY" --gvc "$GVC_NAME" --org "${{ vars.CPLN_ORG }}" -o json \
            | jq -r '.status.endpoint // "pending"')
          echo ""
          echo "  environment: ${{ github.event.inputs.environment }}"
          echo "  gvc:         ${GVC_NAME}"
          echo "  version:     ${{ github.sha }}"
          echo "  endpoint:    ${ENDPOINT}"
          echo "  (other workloads: internal only)"
